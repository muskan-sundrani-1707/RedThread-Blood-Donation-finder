<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Become a Donor | Red Thread – Intelligent Blood Donation Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon">◆</span>
        <span>Red Thread</span>
      </a>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="find-blood.html">Find Blood</a>
        <a href="register.html" class="active">Become Donor</a>
        <a href="about.html">About</a>
        <a href="dashboard.html">Dashboard</a>
      </nav>
      <button class="nav-toggle" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <section class="register-page">
    <div class="container">
      <h1 class="section-title">Register as a Donor</h1>
      <p style="color: var(--gray-600);">Join Red Thread and help save lives. Your registration helps connect donors in emergencies.</p>

      <form class="register-form" id="registerForm">
        <div class="form-row">
          <div class="form-group">
            <label for="name">Full Name *</label>
            <input type="text" id="name" placeholder="Your name" required>
          </div>
          <div class="form-group">
            <label for="age">Age *</label>
            <input type="number" id="age" min="18" max="65" placeholder="18-65" required>
          </div>
        </div>

        <div class="form-group">
          <label for="gender">Gender</label>
          <select id="gender">
            <option value="">Select</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="bloodGroup">Blood Group *</label>
            <select id="bloodGroup" required>
              <option value="">Select</option>
              <option value="A+">A+</option>
              <option value="A-">A-</option>
              <option value="B+">B+</option>
              <option value="B-">B-</option>
              <option value="AB+">AB+</option>
              <option value="AB-">AB-</option>
              <option value="O+">O+</option>
              <option value="O-">O-</option>
            </select>
          </div>
          <div class="form-group">
            <label for="location">Location (City / Area) *</label>
            <div style="display: flex; gap: 10px; align-items: center;">
    <input type="text" id="regLocationInput" placeholder="Enter City Manually" style="flex: 1;">
    <button type="button" id="regGpsBtn" onclick="useGPSLocation('regLocationInput', 'regGpsBtn')" style="cursor: pointer; padding: 10px; background: #e74c3c; color: white; border: none; border-radius: 5px; font-weight: bold;" title="Auto-detect Location">
        📍 Use GPS
    </button>
</div>
          </div>
        </div>

        <div class="form-group">
          <label for="contact">Contact Number *</label>
          <input type="tel" id="contact" placeholder="Phone number" required>
        </div>

        <div class="form-group">
          <label for="lastDonation">When did you last donate blood?</label>
          <select id="lastDonation" required>
            <option value="0">Never / First time today</option>
            <option value="1">1 Month ago</option>
            <option value="3">3 Months ago</option>
            <option value="6">6 Months ago</option>
            <option value="12">1 Year ago</option>
            <option value="24">Over 2 years ago</option>
          </select>
        </div>

        <div class="form-group">
          <label>Availability</label>
          <div class="toggle-group">
            <div class="toggle" id="availabilityToggle" role="button" tabindex="0" aria-pressed="false"></div>
            <span id="availabilityLabel">Not Available</span>
          </div>
          <small style="color: var(--gray-600); font-size: 0.85rem;">Toggle when you can donate</small>
        </div>

        <div class="form-group">
          <div class="checkbox-group">
            <input type="checkbox" id="healthStatus" required>
            <label for="healthStatus">I confirm I am in good health and meet blood donation eligibility criteria (weight ≥45kg, hemoglobin adequate, no recent illness)</label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Register as Life Saver</button>
      </form>
    </div>
  </section>

  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-brand">Red Thread</div>
      <p class="footer-tagline">Donate blood, save lives.</p>
      <p class="footer-emergency">Emergency Helpline: 104</p>
      <p class="footer-copy">&copy; 2025 Red Thread</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    (function() {
      const toggle = document.getElementById('availabilityToggle');
      const label = document.getElementById('availabilityLabel');

      toggle.addEventListener('click', function() {
        toggle.classList.toggle('on');
        toggle.setAttribute('aria-pressed', toggle.classList.contains('on'));
        label.textContent = toggle.classList.contains('on') ? 'Available' : 'Not Available';
      });
    })();
  </script>
</body>
</html>
